<svg id="seal-mascot" viewBox="0 0 100 122" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Data Seal mascot">
  <!-- Drop shadow -->
  <ellipse cx="50" cy="117" rx="28" ry="5" fill="#000" opacity="0.18"/>
  <!-- Tail flippers -->
  <ellipse cx="34" cy="106" rx="21" ry="8" transform="rotate(-22 34 106)" fill="#1a4070"/>
  <ellipse cx="66" cy="106" rx="21" ry="8" transform="rotate(22 66 106)" fill="#1a4070"/>
  <!-- Body -->
  <ellipse cx="50" cy="80" rx="31" ry="33" fill="#2563eb"/>
  <!-- Belly sheen -->
  <ellipse cx="50" cy="85" rx="17" ry="21" fill="#93c5fd" opacity="0.28"/>
  <!-- Left flipper -->
  <ellipse cx="17" cy="77" rx="15" ry="7" transform="rotate(-30 17 77)" fill="#1a4070"/>
  <!-- Right flipper -->
  <ellipse cx="83" cy="77" rx="15" ry="7" transform="rotate(30 83 77)" fill="#1a4070"/>
  <!-- Neck -->
  <ellipse cx="50" cy="52" rx="19" ry="11" fill="#2563eb"/>
  <!-- Head -->
  <circle cx="50" cy="37" r="27" fill="#2563eb"/>
  <!-- Head sheen -->
  <ellipse cx="44" cy="26" rx="12" ry="7" fill="#93c5fd" opacity="0.18" transform="rotate(-15 44 26)"/>
  <!-- Eye whites -->
  <circle cx="37" cy="32" r="9" fill="white"/>
  <circle cx="63" cy="32" r="9" fill="white"/>
  <!-- Pupils -->
  <circle cx="39" cy="33" r="5.5" fill="#0d1117"/>
  <circle cx="65" cy="33" r="5.5" fill="#0d1117"/>
  <!-- Eye highlights -->
  <circle cx="41" cy="30" r="2" fill="white"/>
  <circle cx="67" cy="30" r="2" fill="white"/>
  <!-- Small blue iris glint -->
  <circle cx="37.5" cy="35" r="1.1" fill="#60a5fa" opacity="0.5"/>
  <circle cx="63.5" cy="35" r="1.1" fill="#60a5fa" opacity="0.5"/>
  <!-- Snout -->
  <ellipse cx="50" cy="47" rx="10" ry="7" fill="#1e4d8c"/>
  <!-- Nose -->
  <ellipse cx="50" cy="44" rx="5" ry="3.5" fill="#1a3a5c"/>
  <!-- Nostrils -->
  <ellipse cx="47" cy="43.5" rx="1.3" ry="1" fill="#0d1117"/>
  <ellipse cx="53" cy="43.5" rx="1.3" ry="1" fill="#0d1117"/>
  <!-- Whiskers left -->
  <line x1="20" y1="45" x2="40" y2="47" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <line x1="20" y1="49" x2="40" y2="49" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <!-- Whiskers right -->
  <line x1="60" y1="47" x2="80" y2="45" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <line x1="60" y1="49" x2="80" y2="49" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <!-- Smile -->
  <path d="M43 52 Q50 57.5 57 52" stroke="#1a3a5c" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
